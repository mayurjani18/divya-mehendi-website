<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divya Mehendi Artist</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffaf5;
}

/* Header */
header {
  background: linear-gradient(135deg, #d4af37, #b8962e);
  color: white;
  text-align: center;
  padding: 40px 20px;
}

/* Section */
.section {
  padding: 40px 20px;
  text-align: center;
}

/* Slider */
.slider {
  overflow: hidden;
}
.slides {
  display: flex;
  animation: slide 12s infinite;
}
.slides img {
  width: 100%;
}
@keyframes slide {
  0% {transform: translateX(0);}
  33% {transform: translateX(-100%);}
  66% {transform: translateX(-200%);}
  100% {transform: translateX(0);}
}

/* Services */
.services {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}
.service-box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Button */
.btn {
  padding: 14px 24px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* Floating WhatsApp */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  border-radius: 50%;
  padding: 15px 18px;
  font-size: 20px;
  text-decoration: none;
}

/* Form */
form input, form textarea {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Map */
iframe {
  width: 100%;
  height: 300px;
  border: 0;
}

/* Footer */
footer {
  background: #222;
  color: white;
  padding: 20px;
}
</style>

</head>

<body>

<header>
  <h1>Divya Mehendi Artist</h1>
  <p>Bridal Mehendi Specialist in Morbi Ravapar</p>
</header>

<!-- Slider -->
<div class="slider">
  <div class="slides">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
    <img src="https://i.imgur.com/5tj6S7Ol.jpg">
    <img src="https://i.imgur.com/3ZQ3Z4B.jpg">
  </div>
</div>

<div class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="service-box">Bridal Mehendi</div>
    <div class="service-box">Engagement Mehendi</div>
    <div class="service-box">Festival Mehendi</div>
    <div class="service-box">Family Mehendi</div>
  </div>
</div>

<!-- Booking Form -->
<div class="section">
  <h2>Book Appointment</h2>
  <form>
    <input type="text" placeholder="Your Name" required><br>
    <input type="tel" placeholder="Mobile Number" required><br>
    <input type="date" required><br>
    <textarea placeholder="Your Requirement"></textarea><br>
    <button class="btn">Submit</button>
  </form>
</div>

<!-- Instagram Embed -->
<div class="section">
  <h2>Our Instagram Work</h2>
  <iframe src="https://www.instagram.com/divya_mahendi2505/embed" height="400"></iframe>
</div>

<!-- Map -->
<div class="section">
  <h2>Our Location</h2>
  <iframe src="https://maps.google.com/maps?q=morbi%20ravapar&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<footer>
  © 2026 Divya Mehendi Artist
</footer>

<!-- Floating WhatsApp -->
<a href="https://wa.me/917021642502" class="float">💬</a>

</body>
</html>
